[auth]
site_url = "http://localhost:3001"
additional_redirect_urls = ["http://localhost:3001/**", "http://localhost:3001", "http://localhost:3000/**", "http://localhost:3000"]

[auth.email]
enable_signup = true
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_OAUTH_CLIENT_ID)"
secret = "env(GOOGLE_OAUTH_CLIENT_SECRET)"
